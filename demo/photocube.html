<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Photo Cube Demo</title>
    <link rel="stylesheet" href="/styles/styles.css">
    <script nonce="aem" type="module" src="/scripts/scripts.js"></script>
  </head>
  <body>
    <main>
      <div class="section">
        <h1>Photo Cube Demo</h1>
        <p class="photo-cubes-demo-caption">Nine local skyline assets mapped into the face-grid variant.</p>
      </div>

      <div class="section">
        <div class="photo-cubes">
          <div><div><img src="/demo/photo-cubes-assets/nyc.svg" alt="New York skyline"></div></div>
          <div><div><img src="/demo/photo-cubes-assets/london.svg" alt="London skyline"></div></div>
          <div><div><img src="/demo/photo-cubes-assets/tokyo.svg" alt="Tokyo skyline"></div></div>
          <div><div><img src="/demo/photo-cubes-assets/chicago.svg" alt="Chicago skyline"></div></div>
          <div><div><img src="/demo/photo-cubes-assets/sydney.svg" alt="Sydney skyline"></div></div>
          <div><div><img src="/demo/photo-cubes-assets/toronto.svg" alt="Toronto skyline"></div></div>
          <div><div><img src="/demo/photo-cubes-assets/singapore.svg" alt="Singapore skyline"></div></div>
          <div><div><img src="/demo/photo-cubes-assets/frankfurt.svg" alt="Frankfurt skyline"></div></div>
          <div><div><img src="/demo/photo-cubes-assets/dubai.svg" alt="Dubai skyline"></div></div>
        </div>
      </div>
    </main>
  </body>
</html>
